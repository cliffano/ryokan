---
- hosts: macbookpro00

  tasks:

    # Required by ansible-role-studio-dev
    - name: Provision Studio dev tools
      ansible.builtin.import_role:
        # name: cliffano.studio_dev
        name: gantsign.oh-my-zsh
      vars:
        users:
          - username: cliffano
            oh_my_zsh:
              theme: bullet-train

    - name: Ensure docker.sock points to Colima's Docker socket
      ansible.builtin.file:
        src: "{{ home }}/.colima/globalprotect/docker.sock"
        dest: /var/run/docker.sock
        state: link
      become: yes

    - name: Provision Studio dev tools
      ansible.builtin.import_role:
        # name: cliffano.studio_dev
        name: ansible-role-studio-dev
      vars:
        sdev_username: cliffano
        sdev_home_dir: "{{ home }}"
        sdev_colima_networks:
          - shn
        sdev_docker_images:
          - { id: 'ubuntu', image: 'ubuntu', env_file: "{{ home }}/.env-docker-shn", home_dir: 'root', entrypoint: '/bin/bash' }
          - { id: 'aembuildenv', image: 'shinesolutions/aem-platform-buildenv', env_file: "{{ home }}/.env-docker-shn", home_dir: 'root', entrypoint: '/bin/bash' }
        sdev_gitconfig_link_src: "{{ home }}/dev/workspace-control/config-buss/system-config/git/.gitconfig-{{ inventory_hostname }}"
        sdev_repoman_link_src: "{{ home }}/dev/workspace-control/config-buss/workspace-config/repoman"
        sdev_ssh_configd_link_src: "{{ home }}/dev/workspace-control/config-buss/system-config/ssh/{{ inventory_hostname }}.ssh_config"
        sdev_ssh_configd_file: "{{ inventory_hostname }}.ssh_config"
        sdev_ssh_config_link_src: "{{ home }}/dev/workspace-control/config-buss/user-config/ssh/config"
        sdev_ssh_private_key_link_src: "{{ home }}/dev/workspace-control/config-buss/user-config/ssh/shn_id_rsa"
        sdev_ssh_public_key_link_src: "{{ home }}/dev/workspace-control/config-buss/user-config/ssh/shn_id_rsa.pub"
        sdev_ghostty_config_link_src: "{{ home }}/dev/workspace-control/config-buss/user-config/ghostty/config"
        sdev_tmux_config_link_src: "{{ home }}/dev/workspace-control/config-buss/user-config/tmux/.tmux.conf"
        sdev_tmux_layout_scripts_dir: "{{ home }}/dev/workspace-control/config-buss/workspace-config/tmux"
        sdev_tmux_layout_scripts:
          - bussdig
          - bussint
          - busspla
        sdev_sshkey_name: buss_id_rsa
        sdev_vscode_workspaces:
          - aoc
        sdev_workspaces:
          - bussdig
          - bussint
          - busspla
        sdev_homebrew_packages_extra:
          - 1password-cli
          - cloc
          - docker-credential-helper
          - dos2unix
          - figlet
          - gh
          - gpg2
          - jq
          - mas
          - node
          - packer
          - pinentry-mac
          - telnet
          - yq

